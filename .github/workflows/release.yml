name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install -r requirements.txt

      - name: Build sdist
        run: python -m build --sdist --no-isolation

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  wheels:
    name: Build wheels on ${{ matrix.os }} / ${{ matrix.archs }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archs: "x86_64 aarch64"
            artifact: "linux"
          - os: macos-13
            archs: "x86_64"
            artifact: "macos-x86_64"
          - os: macos-14
            archs: "arm64"
            artifact: "macos-arm64"
          - os: windows-latest
            archs: "AMD64"
            artifact: "windows-amd64"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up QEMU for Linux ARM wheels
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: "cp39-* cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS: "${{ matrix.archs }}"
          CIBW_TEST_COMMAND: "python -c \"from lapq import PriorityQueue; q=PriorityQueue(); q.push(1.0, 'ok'); assert q.pop() == (1.0, 'ok')\""

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.artifact }}
          path: wheelhouse/*.whl

  github-release:
    name: Publish GitHub Release
    needs: [sdist, wheels]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release artifacts
        run: ls -l dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
